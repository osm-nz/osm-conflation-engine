name: Test

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [26.x]

    steps:
      - name: ⏬ Checkout code
        uses: actions/checkout@v7

      - name: 🔢 Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: ⏬ Install
        run: |
          sudo apt-get install osmium-tool -y
          corepack enable
          pnpm install

      - name: ✨ Lint
        run: |
          npm run lint

      - name: 🚛 Build
        run: |
          pnpm run -r build

      - name: ✨ Typecheck
        run: |
          pnpm run -r typecheck

      - name: 🧪 Test
        run: |
          pnpm run -r test -- --coverage

      - name: 😥 Print snapshot diff on failure
        if: failure()
        run: |
          git diff --color=always

      - name: 📈 Coveralls
        uses: coverallsapp/github-action@v1.1.2
        with:
          github-token: ${{ secrets.github_token }}
        continue-on-error: true
